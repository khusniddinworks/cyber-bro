<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'rgba(9, 11, 16, 1)',
            foreground: 'rgba(248, 250, 252, 1)',
            primary: 'rgba(0, 255, 157, 1)',
            accent: 'rgba(138, 43, 226, 1)',
            destructive: 'rgba(255, 51, 102, 1)',
            card: 'rgba(19, 24, 36, 1)',
            border: 'rgba(42, 52, 74, 1)',
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    :root {
      --background: 9 11 16;
      --foreground: 248 250 252;
      --primary: 0 255 157;
      --accent: 138 43 226;
      --destructive: 255 51 102;
      --border: 42 52 74;
    }
    body { background-color: rgb(var(--background)); color: rgb(var(--foreground)); font-family: 'Outfit', sans-serif; overflow: hidden; }
    .glass { background: rgba(19, 24, 36, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(42, 52, 74, 0.5); border-radius: 28px; }
    .grid-bg { background-image: radial-gradient(rgba(42,52,74,0.4) 1px, transparent 1px); background-size: 32px 32px; }
  </style>
</head>
<body>
  <div class="relative h-screen w-full flex flex-col overflow-hidden selection:bg-primary/30">
    <div class="absolute inset-0 z-0 opacity-40 grid-bg pointer-events-none"></div>
    
    <!-- Top Header -->
    <div class="relative z-20 pt-14 px-6 pb-4 bg-background/80 backdrop-blur-xl border-b border-border/40">
        <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-muted-foreground">Defense Matrix</h1>
        <p class="text-xs font-bold text-primary uppercase tracking-[0.3em] mt-1">System Security Hub</p>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 px-6 pt-8 pb-32 space-y-6">
        
        <!-- Integrity Card -->
        <div class="glass p-6 border-primary/20 bg-gradient-to-br from-card/40 to-primary/5">
            <div class="flex items-center justify-between mb-8">
                <div>
                   <span class="text-[10px] font-bold text-primary uppercase tracking-[0.4em] flex items-center gap-2 mb-2">
                      <div class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></div> Integrity Nominal
                   </span>
                   <h3 class="text-5xl font-black tracking-tighter">98.4%</h3>
                </div>
                <div class="w-16 h-16 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center">
                    <iconify-icon icon="lucide:cpu" width="32" class="text-primary"></iconify-icon>
                </div>
            </div>
            <div class="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                <div class="h-full bg-primary w-[98.4%] shadow-[0_0_10px_rgba(0,255,157,0.5)]"></div>
            </div>
            <p class="mt-4 text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center">CyberBrain Protection Active</p>
        </div>

        <!-- Protection Modules -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 border-accent/20">
                <iconify-icon icon="lucide:phone-off" width="24" class="text-accent mb-3"></iconify-icon>
                <h4 class="font-bold text-sm">Vishing Guard</h4>
                <p class="text-[10px] text-slate-500 font-medium mt-1">Voice scam filter</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-[10px] font-black text-accent uppercase">Active</span>
                    <div class="w-8 h-4 bg-accent/20 rounded-full relative">
                        <div class="absolute right-1 top-1 w-2 h-2 bg-accent rounded-full"></div>
                    </div>
                </div>
            </div>
            <div class="glass p-5 border-primary/20">
                <iconify-icon icon="lucide:message-square" width="24" class="text-primary mb-3"></iconify-icon>
                <h4 class="font-bold text-sm">SMS Shield</h4>
                <p class="text-[10px] text-slate-500 font-medium mt-1">Phishing link block</p>
                <div class="mt-4 flex items-center justify-between">
                    <span class="text-[10px] font-black text-primary uppercase">Active</span>
                    <div class="w-8 h-4 bg-primary/20 rounded-full relative">
                        <div class="absolute right-1 top-1 w-2 h-2 bg-primary rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expanded Services -->
        <div class="space-y-4">
            <div class="glass p-5 flex items-center justify-between group active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center">
                        <iconify-icon icon="lucide:fingerprint" width="24" class="text-primary"></iconify-icon>
                    </div>
                    <div>
                        <p class="font-bold text-sm">App Audit</p>
                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wider">124 Apps Scanned</p>
                    </div>
                </div>
                <iconify-icon icon="lucide:chevron-right" width="20" class="text-slate-800 group-hover:text-primary transition-colors"></iconify-icon>
            </div>

            <div class="glass p-5 flex items-center justify-between group active:scale-95 transition-transform">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-slate-900 border border-slate-800 flex items-center justify-center">
                        <iconify-icon icon="lucide:globe" width="24" class="text-accent"></iconify-icon>
                    </div>
                    <div>
                        <p class="font-bold text-sm">Web Filter</p>
                        <p class="text-[11px] text-slate-500 font-bold uppercase tracking-wider">Cloud Analytics</p>
                    </div>
                </div>
                <iconify-icon icon="lucide:chevron-right" width="20" class="text-slate-800 group-hover:text-accent transition-colors"></iconify-icon>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-6 left-6 right-6 z-50">
        <div class="bg-card/80 backdrop-blur-2xl border border-border/50 rounded-[28px] p-2 flex items-center justify-between shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
            <button class="flex flex-col items-center justify-center py-2 px-4 rounded-2xl text-muted-foreground">
                <iconify-icon icon="lucide:shield" width="24"></iconify-icon>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Shield</span>
            </button>
            <button class="flex flex-col items-center justify-center py-2 px-4 rounded-2xl text-muted-foreground">
                <iconify-icon icon="lucide:shield-alert" width="24"></iconify-icon>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Threats</span>
            </button>
            <button class="flex flex-col items-center justify-center py-2 px-4 rounded-2xl text-primary bg-primary/10">
                <iconify-icon icon="lucide:cpu" width="24"></iconify-icon>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Modules</span>
            </button>
            <button class="flex flex-col items-center justify-center py-2 px-4 rounded-2xl text-muted-foreground">
                <iconify-icon icon="lucide:zap" width="24"></iconify-icon>
                <span class="text-[10px] font-bold mt-1 uppercase tracking-tighter">Premium</span>
            </button>
        </div>
    </div>
  </div>
</body>
</html>
