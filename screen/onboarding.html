<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Brother - Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#090B10',
            primary: '#00FF9D',
            accent: '#8A2BE2',
            card: '#131824',
            border: '#2A344A',
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090B10; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
    .grid-bg { background-image: radial-gradient(rgba(42,52,74,0.3) 1px, transparent 1px); background-size: 32px 32px; }
    
    @keyframes orbit {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .animate-orbit { animation: orbit 10s linear infinite; }
    .animate-orbit-reverse { animation: orbit 15s linear infinite reverse; }
    
    .neon-text-glow { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }
    .neon-box-glow { box-shadow: 0 0 20px rgba(0, 255, 157, 0.3); }
  </style>
</head>
<body class="h-screen flex flex-col relative">
  <div class="absolute inset-0 z-0 grid-bg opacity-40"></div>
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_40%,transparent_10%,#090B10_100%)] z-0"></div>

  <main class="relative z-10 flex-1 flex flex-col px-8 pt-16">
    
    <!-- Top Badge -->
    <div class="flex justify-center mb-12">
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-900/80 border border-slate-800 backdrop-blur-xl">
        <div class="w-1.5 h-1.5 rounded-full bg-accent animate-pulse shadow-[0_0_8px_#8A2BE2]"></div>
        <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Offline Node Secure</span>
      </div>
    </div>

    <!-- Atom / Core Visual (1-rasm asosida) -->
    <div class="relative flex-1 flex flex-col items-center justify-center -mt-10">
      <div class="relative w-80 h-80 flex items-center justify-center">
        
        <!-- Dashed Outer -->
        <svg class="absolute w-full h-full opacity-30 text-primary" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 3" />
        </svg>

        <!-- Orbital Rings -->
        <svg class="absolute w-[80%] h-[80%] text-primary/40 animate-orbit" viewBox="0 0 100 100">
          <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(25 50 50)" />
          <circle cx="95" cy="50" r="1.5" fill="currentColor" transform="rotate(25 50 50)" class="shadow-[0_0_10px_#00FF9D]" />
        </svg>

        <svg class="absolute w-[80%] h-[80%] text-accent/40 animate-orbit-reverse" viewBox="0 0 100 100">
          <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(-60 50 50)" />
        </svg>

        <svg class="absolute w-[80%] h-[80%] text-red-500/40 animate-orbit" viewBox="0 0 100 100" style="animation-duration: 12s">
          <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="currentColor" stroke-width="0.75" transform="rotate(80 50 50)" />
        </svg>

        <!-- Central Core -->
        <div class="relative w-32 h-32 rounded-full overflow-hidden flex items-center justify-center">
          <div class="absolute inset-0 bg-slate-900 shadow-[inset_0_0_20px_rgba(0,255,157,0.2)]"></div>
          <!-- Scanning pattern -->
          <div class="absolute inset-0 opacity-20" style="background: repeating-linear-gradient(45deg, #00FF9D, #00FF9D 1px, transparent 1px, transparent 4px);"></div>
          <div class="relative w-14 h-14 rounded-2xl bg-slate-950 border border-primary/40 flex items-center justify-center shadow-[0_0_30px_rgba(0,255,157,0.2)]">
            <iconify-icon icon="lucide:fingerprint" width="32" class="text-primary drop-shadow-[0_0_10px_#00FF9D]"></iconify-icon>
          </div>
        </div>
      </div>

      <!-- Text Content -->
      <div class="text-center mt-12 w-full max-w-[300px]">
        <h1 class="text-[2.75rem] font-black tracking-tight leading-none mb-6">Cyber Brother</h1>
        
        <div class="flex items-center justify-center gap-2 mb-4">
          <iconify-icon icon="lucide:shield-check" class="text-primary" width="22"></iconify-icon>
          <h2 class="text-xl font-extrabold text-white">Local AI Protection</h2>
        </div>
        
        <p class="text-slate-400 text-sm leading-relaxed px-2">
          Advanced offline neural network securing your device in real-time. Unmatched Uzbek language guard.
        </p>

        <!-- Pagination -->
        <div class="flex items-center justify-center gap-2.5 mt-10">
          <div class="h-1.5 w-8 bg-primary rounded-full neon-box-glow"></div>
          <div class="h-1.5 w-1.5 bg-slate-800 rounded-full"></div>
          <div class="h-1.5 w-1.5 bg-slate-800 rounded-full"></div>
        </div>
      </div>

    </div>

    <!-- Actions Area -->
    <div class="mt-auto pb-12 w-full flex flex-col gap-6">
      <button class="group relative w-full h-[72px] bg-primary rounded-[24px] flex items-center justify-center overflow-hidden shadow-[0_20px_40px_rgba(0,255,157,0.15)] active:scale-95 transition-all">
        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
        <span class="relative z-10 text-slate-950 font-black text-lg tracking-wide flex items-center gap-2">
          Initialize Core <iconify-icon icon="lucide:arrow-right" class="font-bold"></iconify-icon>
        </span>
      </button>
      
      <button class="text-slate-500 font-bold text-sm tracking-wide uppercase">Skip Introduction</button>
    </div>

  </main>
</body>
</html>
