<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Brother - Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#090B10',
            primary: '#00FF9D',
            accent: '#8A2BE2',
            card: '#131824',
            border: '#2A344A',
            muted: '#94A3B8',
            secondary: '#1E2536',
          },
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
        },
      },
    }
  </script>
  <style>
    body { background-color: #090B10; color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
    .grid-bg { background-image: radial-gradient(rgba(42,52,74,0.3) 1px, transparent 1px); background-size: 32px 32px; }
    .glass-card { background: rgba(19, 24, 36, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(42, 52, 74, 0.5); }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    .animate-pulse-ring { animation: pulse-ring 3s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }
  </style>
</head>
<body class="h-screen flex flex-col relative px-6">
  <div class="absolute inset-0 z-0 grid-bg opacity-30"></div>

  <!-- Top Status -->
  <header class="relative z-10 pt-14 flex flex-col items-center">
    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900/80 border border-primary/20 backdrop-blur-xl mb-4">
      <div class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_#00FF9D]"></div>
      <span class="text-[9px] font-black text-primary uppercase tracking-[0.2em]">Offline Node: Active</span>
    </div>
    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Welcome, Agent 01</span>
  </header>

  <!-- Central Shield Visual (2-rasm asosida) -->
  <main class="relative z-10 flex-1 flex flex-col items-center justify-center">
    <div class="relative w-64 h-64 flex items-center justify-center">
      
      <!-- Pulsing Rings -->
      <div class="absolute inset-0 border border-primary/20 rounded-full animate-pulse-ring"></div>
      <div class="absolute inset-8 border border-accent/20 rounded-full animate-pulse-ring" style="animation-delay: 1s"></div>
      
      <!-- Core Orb -->
      <div class="relative w-40 h-40 rounded-full glass-card flex items-center justify-center shadow-[0_0_50px_rgba(0,255,157,0.15)]">
        <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary/5 to-transparent"></div>
        <div class="relative w-16 h-16 rounded-2xl bg-slate-950 border border-primary/50 flex items-center justify-center shadow-[inset_0_0_15px_rgba(0,255,157,0.3)]">
          <iconify-icon icon="lucide:shield-check" width="32" class="text-primary drop-shadow-[0_0_8px_#00FF9D]"></iconify-icon>
        </div>
      </div>
    </div>

    <div class="text-center mt-6">
      <h1 class="text-[2.5rem] font-black tracking-tight leading-none mb-2">System Secure</h1>
      <p class="text-[10px] font-black text-primary uppercase tracking-[0.3em] opacity-80">Real-time Defense Active</p>
    </div>

    <!-- Metrics Grid -->
    <div class="grid grid-cols-2 gap-4 w-full mt-12">
      <div class="glass-card p-5 rounded-[28px] border-accent/20">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-8 h-8 rounded-lg bg-accent/10 border border-accent/30 flex items-center justify-center text-accent">
            <iconify-icon icon="lucide:phone-forwarded" width="18"></iconify-icon>
          </div>
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Intercepts</span>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-black">14</span>
          <span class="text-[9px] font-bold text-accent mt-1">+2 Analysts Today</span>
        </div>
      </div>

      <div class="glass-card p-5 rounded-[28px] border-primary/20">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-8 h-8 rounded-lg bg-primary/10 border border-primary/30 flex items-center justify-center text-primary">
            <iconify-icon icon="lucide:globe" width="18"></iconify-icon>
          </div>
          <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Web Scan</span>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-black">89</span>
          <span class="text-[9px] font-bold text-primary mt-1">All Safe</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom CTA -->
  <div class="relative z-10 pb-36">
    <button class="relative w-full h-[72px] bg-primary rounded-[24px] flex items-center justify-center overflow-hidden shadow-[0_20px_40px_rgba(0,255,157,0.2)] active:scale-95 transition-all">
      <div class="absolute inset-0 bg-gradient-to-t from-black/10 to-transparent"></div>
      <span class="relative z-10 text-slate-950 font-black text-lg tracking-wide flex items-center gap-2">
        <iconify-icon icon="lucide:zap" width="20"></iconify-icon> Initiate Deep Scan
      </span>
    </button>
  </div>

  <!-- Master Bottom Navigation -->
  <nav class="fixed bottom-6 left-6 right-6 z-[60]">
    <div class="bg-card/90 backdrop-blur-3xl border border-white/5 rounded-[32px] p-2 flex items-center justify-between shadow-[0_20px_50px_rgba(0,0,0,0.6)]">
      <button class="flex flex-col items-center justify-center py-2 px-5 rounded-3xl text-primary bg-primary/10">
        <iconify-icon icon="lucide:shield" width="24"></iconify-icon>
        <span class="text-[9px] font-black mt-1 uppercase">Shield</span>
      </button>
      <button class="flex flex-col items-center justify-center py-2 px-5 rounded-3xl text-slate-500">
        <iconify-icon icon="lucide:shield-alert" width="24"></iconify-icon>
        <span class="text-[9px] font-black mt-1 uppercase">Threats</span>
      </button>
      <button class="flex flex-col items-center justify-center py-2 px-5 rounded-3xl text-slate-500">
        <iconify-icon icon="lucide:cpu" width="24"></iconify-icon>
        <span class="text-[9px] font-black mt-1 uppercase">Modules</span>
      </button>
      <button class="flex flex-col items-center justify-center py-2 px-5 rounded-3xl text-slate-500">
        <iconify-icon icon="lucide:zap" width="24"></iconify-icon>
        <span class="text-[9px] font-black mt-1 uppercase">Premium</span>
      </button>
    </div>
  </nav>

</body>
</html>
